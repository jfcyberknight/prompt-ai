name: 🚢 Prompt-AI Documentation Sync

on:
  workflow_call:
    secrets:
      LLM_API_KEY:
        required: true
      GH_PAT:
        required: true
    inputs:
      AI_SMART_ROUTER_URL:
        description: "URL de l'API smart router (défaut: https://ai-smart-router.vercel.app)"
        required: false
        default: "https://ai-smart-router.vercel.app"

jobs:
  sync_docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/checkout@v4
        with:
          repository: jfcyberknight/prompt-ai
          path: prompt-ai-tools
          token: ${{ secrets.GH_PAT }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests GitPython

      - name: Run Maestro Sync Engine
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          AI_SMART_ROUTER_URL: ${{ inputs.AI_SMART_ROUTER_URL }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          python prompt-ai-tools/scripts/sync_engine.py
